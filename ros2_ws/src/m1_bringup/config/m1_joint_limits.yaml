# M1 per-joint limits for the 19 upper-body joints.
#
# Position/velocity/effort limits are taken VERBATIM from the <limit> tags in
# assets/ranger_air_description/urdf/ranger_air_description.urdf (the source of
# truth). Consumed by ros2_control's joint_limits / enforce_command_limits so a
# streamed setpoint is clamped to these bounds (the framework version of the
# brain's IK_MAX_DQ; defense in depth).
#
# Acceleration limits are NOT in the URDF, so modest defaults are supplied:
#   arms        20.0 rad/s^2
#   lift         1.0 m/s^2
#   fingers     10.0 rad/s^2
# Tune on real hardware.
#
# NOTE: openarm_*_finger_joint2 is URDF mimic-coupled to finger_joint1; its
# limits mirror finger_joint1 (same magnitude; right side ranges into negatives
# per the mirrored URDF axis).

joint_limits:

  # Shared prismatic lift (metres / m/s / N).
  lift_joint:
    has_position_limits: true
    min_position: 0.0
    max_position: 0.85
    has_velocity_limits: true
    max_velocity: 0.25
    has_effort_limits: true
    max_effort: 500.0
    has_acceleration_limits: true
    max_acceleration: 1.0

  # ----- Left arm (radians / rad/s / Nm) -----
