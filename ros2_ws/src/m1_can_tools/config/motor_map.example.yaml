# M1 motor map (ID -> logical joint) -- EXAMPLE / template.
#
# Maps each Damiao CAN motor to a logical joint name (the canonical 27-DOF
# contract order, upper body only -- the base is AgileX firmware, not per-joint
# CAN). The m1_hwconfig web page edits & persists this; the C++ SystemInterface
# (Phase 2) reads the same schema.
#
# Per joint:
#   id          CAN slave id (1..n on the bus)
#   master_id   host/master id = id + 0x10 (feedback arbitration id); never 0
#   model       DM model -> per-model [P,V,T]MAX (see dm_protocol.LIMITS)
#   kp / kd     MIT-mode impedance gains (NON-ZERO -- the C++ plugin refuses the
#               bus if a commanded joint has kp == 0; tune per control_gains.yaml)
#   soft_limits pos: [lo, hi] (rad / m), vel (rad/s), effort (Nm) -- clamps jog
#   dir         +1 / -1  joint-direction sign vs. the motor
#   offset      zero offset (rad / m) applied to feedback position
#
# ⚠️  MODELS BELOW ARE PLACEHOLDERS. The arms are customized-OpenArm -- confirm
#     each motor's real part number on the bench (it scales the quantization)
#     and re-assign IDs via the config page before live control.

# --- Shared prismatic lift -------------------------------------------------
lift_joint:
  id: 0x01
  master_id: 0x11
  model: DM8009
  kp: 120.0
  kd: 3.0
  soft_limits: {pos: [0.0, 0.85], vel: 0.25, effort: 50.0}
  dir: 1
  offset: 0.0

