# Demo motor map for the m1_hwconfig SIM transport (offline, no hardware).
#   ros2 run m1_can_tools m1_hwconfig --ros-args \
#       -p transport:=sim -p motor_map:=<this file>
# Models follow the OpenArm BOM (DM8009 shoulders, DM4340 elbows, DM4310 wrists
# + grippers). 17 commanded motors (the 2 finger_joint2 are URDF mimics -> no
# motor). Soft limits stay within each model's [P,V,T]MAX so the limits editor
# validates. These are PLACEHOLDER ids/gains -- confirm against the real bus.
# NOTE: m1_hwconfig persists map edits back to its motor_map path; point it at a
# /tmp copy if you want to keep this reference file pristine.
lift_joint:            {id: 0x01, master_id: 0x11, model: DM8009, kp: 80.0, kd: 2.0, dir: 1, offset: 0.0, soft_limits: {pos: [0.0, 0.85], vel: 6.0, effort: 30.0}}
