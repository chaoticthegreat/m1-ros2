m1_controller:
  ros__parameters:
    # 120 Hz halves the tick-phase latency a streamed teleop target waits for the
    # next solve (60 Hz is a soft goal; the tracking solve is ~3 ms, well within
    # the 8.3 ms period). The MultiThreadedExecutor keeps feedback ingestion off
    # the solve thread so the higher rate holds under load.
    control_rate: 120.0
    command_topic: /m1/joint_command
    # urdf_path defaults to the installed ranger_air_description URDF; override
    # here if you keep the URDF elsewhere.
    # urdf_path: /home/jerry/Downloads/m1-ros2-setup/assets/ranger_air_description/urdf/ranger_air_description.urdf
