# ROS 2 / DDS kernel tuning -- install to /etc/sysctl.d/60-ros2-dds.conf then
#   sudo sysctl -p /etc/sysctl.d/60-ros2-dds.conf
# Raises UDP buffers (the documented Fast DDS first-message-latency fix) and
# ipfrag limits. See DEPLOY_AGX_ORIN.md "Phase 10".
net.core.rmem_max=2147483647
net.ipv4.ipfrag_time=3
net.ipv4.ipfrag_high_thresh=134217728
